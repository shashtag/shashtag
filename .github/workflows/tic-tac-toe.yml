name: Tic Tac Toe Game

on:
  issues:
    types: [opened]

jobs:
  play:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'ttt|')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Play Game Move
        run: node play-game.mjs
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md game-state.json
          git commit -m "🎮 Play Tic-Tac-Toe move from @${{ github.event.issue.user.login }}"
          git push

      - name: Close Issue
        run: gh issue close ${{ github.event.issue.number }} --comment "Move processed! Check the board on my profile page: https://github.com/shashtag"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
